spring:
  application:
    name: desafio-checkpoint-java-nivel1

  datasource:
    url: jdbc:postgresql://${DB_HOST}/desafio_java_nivel1
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    format-sql: true

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 50
